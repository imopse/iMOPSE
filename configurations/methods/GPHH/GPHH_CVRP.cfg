# GPHH  RandomCVRP GreedyNN_CVRP GreedyBI_CVRP GreedyMS_CVRP
MethodName GPHH
PopulationSize 100
GenerationLimit 100
TreeDepthLimit 7
TournamentSize 10
PointMutationRate 0.1
SubtreeMutationRate 0.1
CrossoverRate 0.9
EliteSize 0
ObjectiveWeights [1.0]

# Enabled terminals (heuristics) - comma-separated
# Available: Dist, Demand, RC, DRC, NCC, Const
EnabledHeuristics Dist,Demand,RC,DRC,NCC,Const

# Enabled operators (functions) - comma-separated
# Available: +, -, *, /, min, max
# Leave empty for terminal-only trees (pure greedy)
EnabledOperators +,-,*,/,min,max

# ===== Logging Configuration =====

# Master Switch
EnableLogging 1
EnableConsoleOutput 1

# Output Settings
LogInterval 20       # Print to console every N generations
EnableGenerationReport 1 # Save per-generation stats to CSV
EnableFinalReport 1      # Print summary at the end

# --- Basic Metrics ---
LogGenerationTime 1
LogBestFitness 1
LogAvgFitness 1
LogWorstFitness 1
LogStdDevFitness 1

# --- Advanced Statistical Metrics ---
LogMedianFitness 1      # Middle value (requires sorting)
LogVarianceFitness 1    # Variance calculation
LogP90Fitness 1         # 90th percentile (excludes bottom 10%)
LogP95Fitness 1         # 95th percentile (excludes bottom 5%)

# --- Solution Details ---
LogBestDistance 1
LogOptimalValue 0
LogBestFormula 0
LogBestSolution 1
LogPopulationDetails 0
LogIndividualFitness 1